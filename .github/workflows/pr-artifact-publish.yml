name: PR Artifact Publisher

on:
  pull_request_target:
    branches: [main]
    paths-ignore: [docs/**, doxygen_doc/**, lgtm/**, utilities/**, scripts/**, "**.md", "**.mdx"]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_run:
    workflows: [PR Artifacts]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: pr-artifact-publish-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name == 'pull_request_target' || github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request metadata
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            pr_number=$(jq -r '.pull_request.number' "$EVENT_PATH")
            head_sha=$(jq -r '.pull_request.head.sha' "$EVENT_PATH")
          else
            pr_number=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$EVENT_PATH")
            head_sha=$(jq -r '.workflow_run.head_sha' "$EVENT_PATH")
          fi

          if [ -z "$pr_number" ] && [ -n "$head_sha" ]; then
            pr_number=$(gh api "repos/${REPOSITORY}/commits/${head_sha}/pulls" --jq 'map(select(.state == "open" and .base.ref == "main"))[0].number // empty')
          fi

          if [ -z "$pr_number" ] || [ -z "$head_sha" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_head=$(gh api "repos/${REPOSITORY}/pulls/${pr_number}" --jq '.head.sha')
          if [ "$current_head" != "$head_sha" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "head-sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "tag=pr-${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Check out workflow actions
        if: steps.pr.outputs.found == 'true'
        uses: actions/checkout@v4

      - name: Reset stale release assets for this PR build
        if: steps.pr.outputs.found == 'true' && github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.pr.outputs.tag }}
        run: gh release delete "$TAG" --repo "$REPOSITORY" --cleanup-tag --yes || true

      - name: Publish completed workflow artifacts to the PR release
        if: steps.pr.outputs.found == 'true' && github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head-sha }}
          TAG: ${{ steps.pr.outputs.tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/pr-artifacts"
          mkdir -p "$artifact_dir"
          gh run download "$RUN_ID" --repo "$REPOSITORY" --dir "$artifact_dir" || true

          mapfile -t assets < <(find "$artifact_dir" -type f \( -name 'cbn-*.tar.gz' -o -name 'cbn-*.zip' -o -name 'cbn-*.dmg' -o -name 'cbn-*.apk' \))
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No packaged PR artifacts were uploaded by run $RUN_ID"
            exit 0
          fi

          if ! gh release view "$TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPOSITORY" \
              --title "PR #${PR_NUMBER} build ${HEAD_SHA:0:7}" \
              --notes "Downloadable playtest builds for PR #${PR_NUMBER} at ${HEAD_SHA}." \
              --prerelease \
              --target "$DEFAULT_BRANCH"
          fi

          gh release upload "$TAG" "${assets[@]}" --repo "$REPOSITORY" --clobber

      - name: Update pull request body
        if: steps.pr.outputs.found == 'true'
        uses: ./.github/actions/update-pr-artifact-body
        with:
          repository: ${{ github.repository }}
          pr-number: ${{ steps.pr.outputs.number }}
          head-sha: ${{ steps.pr.outputs.head-sha }}
          token: ${{ github.token }}
