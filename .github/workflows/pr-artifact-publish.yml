name: PR Artifact Publisher

on:
  workflow_run:
    workflows: [linux, other]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: pr-artifact-publish-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          pr_number=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")

          if [ -z "$pr_number" ]; then
            pr_number=$(gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}/pulls" --jq 'map(select(.state == "open" and .base.ref == "main"))[0].number // empty')
          fi

          if [ -z "$pr_number" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_head=$(gh api "repos/${REPOSITORY}/pulls/${pr_number}" --jq '.head.sha')
          if [ "$current_head" != "$HEAD_SHA" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "head-sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Read completed artifact workflow runs
        id: runs
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head-sha }}
        run: |
          set -euo pipefail

          run_for_workflow() {
            local workflow_file="$1"
            gh api "repos/${REPOSITORY}/actions/workflows/${workflow_file}/runs?event=pull_request&head_sha=${HEAD_SHA}&per_page=1" \
              --jq '.workflow_runs[0] // {}'
          }

          linux_run=$(run_for_workflow matrix.yml)
          other_run=$(run_for_workflow platform-ci.yml)

          linux_status=$(jq -r '.status // empty' <<<"$linux_run")
          other_status=$(jq -r '.status // empty' <<<"$other_run")

          if [ "$linux_status" != "completed" ] || [ "$other_status" != "completed" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "linux-id=$(jq -r '.id' <<<"$linux_run")" >> "$GITHUB_OUTPUT"
          echo "linux-url=$(jq -r '.html_url' <<<"$linux_run")" >> "$GITHUB_OUTPUT"
          echo "other-id=$(jq -r '.id' <<<"$other_run")" >> "$GITHUB_OUTPUT"
          echo "other-url=$(jq -r '.html_url' <<<"$other_run")" >> "$GITHUB_OUTPUT"

      - name: Build artifact block
        id: body
        if: steps.runs.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          LINUX_RUN_ID: ${{ steps.runs.outputs.linux-id }}
          LINUX_RUN_URL: ${{ steps.runs.outputs.linux-url }}
          OTHER_RUN_ID: ${{ steps.runs.outputs.other-id }}
          OTHER_RUN_URL: ${{ steps.runs.outputs.other-url }}
        run: |
          set -euo pipefail

          artifact_url() {
            local run_id="$1"
            local artifact_name="$2"
            local artifact_id
            artifact_id=$(gh api "repos/${REPOSITORY}/actions/runs/${run_id}/artifacts?name=${artifact_name}" \
              --jq '.artifacts[0] | select(.expired == false) | .id // empty')
            if [ -n "$artifact_id" ]; then
              printf 'https://github.com/%s/actions/runs/%s/artifacts/%s' "$REPOSITORY" "$run_id" "$artifact_id"
            fi
          }

          artifact_line() {
            local label="$1"
            local url="$2"
            local run_url="$3"
            if [ -n "$url" ]; then
              printf -- '- [✅ %s — download](%s)\n' "$label" "$url"
            else
              printf -- '- [❌ %s — build failed](%s)\n' "$label" "$run_url"
            fi
          }

          linux_url=$(artifact_url "$LINUX_RUN_ID" linux-tiles-x64)
          windows_url=$(artifact_url "$OTHER_RUN_ID" windows-tiles-x64-msvc)
          macos_url=$(artifact_url "$OTHER_RUN_ID" osx-tiles-x64)
          android_url=$(artifact_url "$OTHER_RUN_ID" android-x64)

          {
            echo 'content<<EOF'
            echo '## Build Artifacts'
            echo
            artifact_line 'Linux tiles' "$linux_url" "$LINUX_RUN_URL"
            artifact_line 'Windows tiles' "$windows_url" "$OTHER_RUN_URL"
            artifact_line 'macOS tiles' "$macos_url" "$OTHER_RUN_URL"
            artifact_line 'Android tiles' "$android_url" "$OTHER_RUN_URL"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check out workflow actions
        if: steps.runs.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Update pull request body
        if: steps.runs.outputs.ready == 'true'
        uses: ./.github/actions/update-pr-artifact-body
        with:
          repository: ${{ github.repository }}
          pr-number: ${{ steps.pr.outputs.number }}
          content: ${{ steps.body.outputs.content }}
          token: ${{ github.token }}
