name: Update PR artifact body

description: Update the Build Artifacts block at the bottom of a pull request body

inputs:
  repository:
    description: owner/repo containing the pull request
    required: true
  pr-number:
    description: Pull request number
    required: true
  head-sha:
    description: Pull request head commit SHA
    required: true
  token:
    description: GitHub token with pull-requests:write and actions:read
    required: true

runs:
  using: composite
  steps:
    - name: Update Build Artifacts block
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPOSITORY: ${{ inputs.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        HEAD_SHA: ${{ inputs.head-sha }}
      run: |
        set -euo pipefail

        tag="pr-${PR_NUMBER}"
        release_base="https://github.com/${REPOSITORY}/releases/download/${tag}"

        artifact_state() {
          local label="$1"
          local asset="$2"
          local workflow_file="$3"

          local asset_name
          asset_name=$(gh release view "$tag" --repo "$REPOSITORY" --json assets \
            --jq ".assets[] | select(.name == \"${asset}\") | .name" 2>/dev/null || true)
          if [ "$asset_name" = "$asset" ]; then
            printf -- '- [✅ %s — download](%s/%s)\n' "$label" "$release_base" "$asset"
            return
          fi

          local run_json
          run_json=$(gh api \
            "repos/${REPOSITORY}/actions/workflows/${workflow_file}/runs?event=pull_request&head_sha=${HEAD_SHA}&per_page=1" \
            --jq '.workflow_runs[0] // {}')

          local run_url status conclusion
          run_url=$(jq -r '.html_url // empty' <<<"$run_json")
          status=$(jq -r '.status // empty' <<<"$run_json")
          conclusion=$(jq -r '.conclusion // empty' <<<"$run_json")

          if [ -z "$run_url" ]; then
            run_url="https://github.com/${REPOSITORY}/actions/workflows/${workflow_file}"
          fi

          if [ "$status" = "completed" ] && [ "$conclusion" != "success" ]; then
            printf -- '- [❌ %s — build failed](%s)\n' "$label" "$run_url"
          else
            printf -- '- [⌛ %s — building](%s)\n' "$label" "$run_url"
          fi
        }

        linux_asset="cbn-linux-tiles-x64-${tag}.tar.gz"
        windows_asset="cbn-windows-tiles-x64-msvc-${tag}.zip"
        macos_asset="cbn-osx-tiles-x64-${tag}.dmg"
        android_asset="cbn-android-x64-${tag}.apk"

        block=$(cat <<EOF
        <!-- BEGIN artifact comment -->

        ## Build Artifacts

        $(artifact_state "Linux tiles" "$linux_asset" "pr-artifact-linux.yml")
        $(artifact_state "Windows tiles" "$windows_asset" "pr-artifact-windows.yml")
        $(artifact_state "macOS tiles" "$macos_asset" "pr-artifact-macos.yml")
        $(artifact_state "Android tiles" "$android_asset" "pr-artifact-android.yml")
        <!-- END artifact comment -->
        EOF
        )

        body=$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.body // ""')
        clean_body=$(printf '%s' "$body" | perl -0pe 's/\n*<!-- BEGIN artifact comment -->.*?<!-- END artifact comment -->\s*//sg; s/[ \t]+\n/\n/g; s/\s+\z//')

        if [ -n "$clean_body" ]; then
          printf -v new_body '%s\n\n%s' "$clean_body" "$block"
        else
          new_body="$block"
        fi

        jq -n --arg body "$new_body" '{body: $body}' > "$RUNNER_TEMP/pr-body.json"
        gh api -X PATCH "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --input "$RUNNER_TEMP/pr-body.json" >/dev/null
